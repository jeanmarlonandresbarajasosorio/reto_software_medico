<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>- Gestión de Dispositivos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background-color: #f4f7f6; }
        
        .sidebar { width: 260px; background-color: #2c3e73; color: white; display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; }
        .logo-box { text-align: center; margin-bottom: 30px; }
        .logo-box img { width: 80px; height: 80px; border-radius: 50%; background: white; margin-bottom: 10px; }
        .nav-item { color: #d1d8e0; padding: 12px; text-decoration: none; display: block; border-radius: 5px; margin-bottom: 5px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: #1e2a52; color: white; }

        .content { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .header { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .table-container { background: white; margin-top: 20px; padding: 20px; border-radius: 8px; }
        
        .btn-create { background-color: #8cc63f; color: white; border: none; }
        .pagination .page-link { color: #8cc63f; }
        .pagination .page-item.active .page-link { background-color: #8cc63f; border-color: #8cc63f; color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-box">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Logo">
            <div></div>
        </div>
        <a href="mantenimiento.html" class="nav-item">Mantenimiento Anual</a>
        <a href="dispositivo.html" class="nav-item active">Dispositivos</a>
    </div>

    <div class="content">
        <div class="header">
            <h3>Dispositivos</h3>
            <button class="btn btn-create" data-bs-toggle="modal" data-bs-target="#modalDispositivo">
                <i class="bi bi-plus-lg"></i> Crear Dispositivo
            </button>
        </div>
        
        <div class="table-container">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Acciones</th><th>Año</th><th>Memoria</th><th>Prox. Mantenimiento</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><i class="bi bi-eye"></i> <i class="bi bi-pencil"></i></td>
                        <td>2026</td>
                        <td>16GB</td>
                        <td>15/08/2026</td>
                    </tr>
                </tbody>
            </table>

            <nav class="mt-4">
                <ul class="pagination justify-content-center">
                    <li class="page-item active"><a class="page-link" href="#">1</a></li>
                    <li class="page-item"><a class="page-link" href="#">2</a></li>
                    <li class="page-item"><a class="page-link" href="#">3</a></li>
                </ul>
            </nav>
        </div>
    </div>

    <div class="modal fade" id="modalDispositivo" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nuevo Registro de Dispositivo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Año del dispositivo</label>
                            <input type="number" class="form-control" placeholder="Ej: 2026">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Memoria</label>
                            <input type="text" class="form-control" placeholder="Ej: 16GB">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Fecha del próximo mantenimiento</label>
                            <input type="date" class="form-control">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
